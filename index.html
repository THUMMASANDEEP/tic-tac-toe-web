<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121629; 
            color: white;
        }

        .game-container {
            text-align: center;
            background: #181d31;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .title {
            margin-top: 0;
            color: #6d8bb1;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.2), -1px -1px 3px rgba(0, 0, 0, 0.5);
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .controls {
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        select {
            padding: 8px 12px;
            border-radius: 5px;
            background: #1b3b6c;
            color: white;
            border: 1px solid #ea4b68;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
        }

        .status {
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 700;
            height: 40px;
            color: #ea4b68; 
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-gap: 10px;
            margin: 0 auto 30px auto;
            width: max-content;
        }

        .cell {
            width: 110px;
            height: 110px;
            background-color: #1b3b6c; 
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .cell:hover {
            background-color: #254b87;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.x { color: #ea4b68; }
        .cell.o { color: #8cb1e3; }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #ea4b68; 
            color: white;
            border: none;
            border-radius: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #f75c78;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Kept the title out of the screenshot reference just in case, but structure remains intact -->
        <div class="controls" style="margin-top: 20px;">
            <label for="mode">Game Mode: </label>
            <select id="mode">
                <option value="pvp">Player vs Player</option>
                <option value="ai">Player vs AI</option>
            </select>
        </div>

        <div class="status" id="status">Player X's Turn</div>
        
        <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="restart">Restart Game</button>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const restartBtn = document.getElementById('restart');
        const modeSelect = document.getElementById('mode');

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], 
            [0, 3, 6], [1, 4, 7], [2, 5, 8], 
            [0, 4, 8], [2, 4, 6]             
        ];

        let options = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let running = false;

        initializeGame();

        function initializeGame() {
            cells.forEach(cell => cell.addEventListener('click', cellClicked));
            restartBtn.addEventListener('click', restartGame);
            modeSelect.addEventListener('change', restartGame);
            statusText.textContent = `Player ${currentPlayer}'s Turn`;
            running = true;
        }

        function cellClicked() {
            const cellIndex = this.getAttribute('data-index');

            if (options[cellIndex] !== "" || !running) {
                return;
            }

            updateCell(this, cellIndex);
            checkWinner();

            if (running && modeSelect.value === 'ai' && currentPlayer === 'O') {
                running = false; 
                statusText.textContent = "AI is thinking...";
                setTimeout(aiMove, 600); 
            }
        }

        function updateCell(cell, index) {
            options[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
        }

        function changePlayer() {
            currentPlayer = (currentPlayer === "X") ? "O" : "X";
            statusText.textContent = `Player ${currentPlayer}'s Turn`;
        }

        function checkWinner() {
            let roundWon = false;

            for (let i = 0; i < winConditions.length; i++) {
                const condition = winConditions[i];
                const cellA = options[condition[0]];
                const cellB = options[condition[1]];
                const cellC = options[condition[2]];

                if (cellA === "" || cellB === "" || cellC === "") {
                    continue;
                }
                if (cellA === cellB && cellB === cellC) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusText.textContent = `Player ${currentPlayer} Wins!`;
                running = false;
            } else if (!options.includes("")) {
                statusText.textContent = `Game ended in a draw!`;
                running = false;
            } else {
                changePlayer();
            }
        }

        function aiMove() {
            let availableCells = [];
            
            for (let i = 0; i < options.length; i++) {
                if (options[i] === "") {
                    availableCells.push(i);
                }
            }

            if (availableCells.length > 0) {
                const randomIndex = Math.floor(Math.random() * availableCells.length);
                const cellIndex = availableCells[randomIndex];
                const cell = document.querySelector(`.cell[data-index="${cellIndex}"]`);
                
                running = true; 
                updateCell(cell, cellIndex);
                checkWinner();
            }
        }

        function restartGame() {
            currentPlayer = "X";
            options = ["", "", "", "", "", "", "", "", ""];
            statusText.textContent = `Player ${currentPlayer}'s Turn`;
            
            cells.forEach(cell => {
                cell.textContent = "";
                cell.classList.remove('x', 'o');
            });
            
            running = true;
        }
    </script>
</body>
</html>
